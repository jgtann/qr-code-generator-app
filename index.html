<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic QR Code Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <main class="container">
        <div class="glass-panel">
            <header class="header">
                <h1>QR Generator</h1>
                <p>Create a QR code instantly. Enter your link below and share it with the world.</p>
            </header>

            <div class="input-group">
                <input type="url" id="urlInput" placeholder="https://example.com" required autocomplete="off">
                <button id="generateBtn" class="btn">
                    <span>Generate</span>
                    <svg class="icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </div>

            <div class="qr-container" id="qrContainer">
                <div class="qr-placeholder" id="qrPlaceholder">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <rect x="7" y="7" width="3" height="3"></rect>
                        <rect x="14" y="7" width="3" height="3"></rect>
                        <rect x="7" y="14" width="3" height="3"></rect>
                        <rect x="14" y="14" width="3" height="3"></rect>
                    </svg>
                    <p>Your QR code will appear here</p>
                </div>
                <div id="qrcode"></div>
            </div>
            
            <div class="instructions" id="instructions">
                <p><strong>Step 1:</strong> Point your camera at the QR code</p>
                <p><strong>Step 2:</strong> Tap the link to open the website on your phone</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/davidshimjs-qrcodejs@0.0.2/qrcode.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
